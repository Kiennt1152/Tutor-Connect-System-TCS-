spring.application.name=tcs
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/tutorconnectsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

app.jwt.secret=TCS-Super-Secret-Key-For-JWT-Min-256-Bits-Long-2026!!
app.jwt.expiration-ms=86400000

# Email (dev: false = log only; true = send via SMTP)
app.mail.enabled=false
app.mail.from=noreply@tutorconnect.local
spring.mail.host=localhost
spring.mail.port=1025