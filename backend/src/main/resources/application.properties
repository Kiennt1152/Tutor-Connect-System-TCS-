spring.application.name=tcs
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/tutorconnectsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Flyway is the single source of truth for the schema; Hibernate only maps entities.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Set to false so Flyway always applies V1 (init schema) instead of baselining over it.
# If the schema is non-empty without a flyway history, Flyway will fail loudly instead of silently skipping V1.
spring.flyway.baseline-on-migrate=false